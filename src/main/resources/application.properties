spring.application.name=eurotech-hackathon-be
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
# Only takes effect for embedded DBs (H2) since data.sql only auto-runs
# there by default (spring.sql.init.mode=embedded) - lets Hibernate create
# the schema before data.sql seeds it.
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql  =true
spring.jpa.show-sql=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable the H2 Console
spring.h2.console.enabled=true

# (Optional) Customize the endpoint path (default is /h2-console)
spring.h2.console.path=/h2-console

server.port=8080
server.servlet.context-path=/

# true (default) -> connect to the Oracle instance configured below
# (spring.datasource.* in the active profile's application-{profile}.properties).
# false -> use an in-memory H2 database instead (see config.DataSourceConfig);
# no Oracle instance needed, schema is created from the JPA entities.
qagenie.datasource.use-oracle-db=${USE_ORACLE_DB:false}

# false -> skip auth entirely (permitAll, anonymous requests granted every
# role) so the API is usable while the rest of the app is being built.
# Flip back to true once ready to enforce real JWT-based auth again.
qagenie.security.jwt.enabled=${JWT_ENABLED:false}
qagenie.security.jwt.secret=${JWT_SECRET:qagenie-local-dev-jwt-signing-secret-change-me}
qagenie.security.jwt.expiration-ms=${JWT_EXPIRY:10000}
# 8h

qagenie.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Where uploaded per-project keystore/truststore files are stored for
# spec-fetch mutual TLS. Must be a private, non-web-served directory.
# In production, point this at a mounted secrets volume and consider
# a real secrets manager instead of filesystem storage.
qagenie.certs.storage-dir=${CERTS_STORAGE_DIR:/var/qagenie/certs}

# Default path appended after the application name when deriving a spec
# URL (baseUrl + "/" + appName + suffix). A Project's own SPEC_PATH_SUFFIX
# overrides this when set.
qagenie.spec.swagger-suffix=${SWAGGER_SUFFIX:/v3/api-docs}

# When true, "Generate Scenarios" calls a real LLM (via qagenie.scenario-generation.ai.*)
# to author test scenarios from a spec version's endpoints. When false (default),
# scenarios are synthesized deterministically in-code - no external call, no API key needed.
qagenie.scenario-generation.use-ai=${SCENARIO_GENERATION_USE_AI:false}
qagenie.scenario-generation.ai.api-key=${AI_API_KEY:}
qagenie.scenario-generation.ai.model=${AI_MODEL:claude-sonnet-5}
qagenie.scenario-generation.ai.base-url=${AI_BASE_URL:https://api.anthropic.com/v1/messages}

# Directory where generated .feature files (Scenario Outline + Examples, substituted
# from linked TEST_DATA rows) are written before Cucumber executes them.
qagenie.execution.feature-dir=${EXECUTION_FEATURE_DIR:${java.io.tmpdir}/qagenie-features}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

management.endpoints.web.exposure.include=health,info

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.qagenie.testbe=DEBUG
